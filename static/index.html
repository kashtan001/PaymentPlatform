<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Team Pay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Onest", "sans-serif"],
                        mono: ["IBM Plex Mono", "monospace"]
                    },
                    boxShadow: {
                        shell: "0 32px 80px rgba(15, 23, 42, 0.08)",
                        soft: "0 18px 40px rgba(15, 23, 42, 0.05)"
                    }
                }
            }
        };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <style>
        :root {
            --page-bg: #f6f9fc;
            --page-top: #eef4fb;
            --panel: rgba(255, 255, 255, 0.96);
            --panel-soft: #f9fbff;
            --line: #dfe7f3;
            --line-strong: #ccd7e6;
            --text: #0f172a;
            --muted: #5b6b81;
            --accent: #635bff;
            --accent-dark: #4f46e5;
            --success: #0f766e;
        }

        [x-cloak] {
            display: none !important;
        }

        html, body {
            min-height: 100%;
        }

        body {
            font-family: "Onest", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(99, 91, 255, 0.10), transparent 26%),
                radial-gradient(circle at top right, rgba(14, 165, 233, 0.08), transparent 22%),
                linear-gradient(180deg, var(--page-top) 0%, var(--page-bg) 30%, #f8fbff 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: linear-gradient(rgba(148, 163, 184, 0.06) 1px, transparent 1px);
            background-size: 100% 36px;
            mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.4), transparent 84%);
        }

        .surface {
            background: var(--panel);
            border: 1px solid var(--line);
            box-shadow: 0 20px 48px rgba(15, 23, 42, 0.06);
        }

        .surface-soft {
            background: var(--panel-soft);
            border: 1px solid var(--line);
        }

        .field-input {
            border: 1px solid var(--line);
            background: #ffffff;
            color: var(--text);
            transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
        }

        .field-input:focus {
            outline: none;
            border-color: rgba(99, 91, 255, 0.48);
            box-shadow: 0 0 0 4px rgba(99, 91, 255, 0.12);
        }

        .comment-card {
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(circle at top right, rgba(99, 91, 255, 0.14), transparent 36%),
                linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
            border: 1px solid rgba(99, 91, 255, 0.18);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85);
        }

        .comment-card::before {
            content: "";
            position: absolute;
            inset: 0 auto 0 0;
            width: 4px;
            background: linear-gradient(180deg, rgba(99, 91, 255, 0.78) 0%, rgba(14, 165, 233, 0.44) 100%);
        }

        .comment-icon-shell {
            background: rgba(99, 91, 255, 0.12);
            color: var(--accent);
            border: 1px solid rgba(99, 91, 255, 0.18);
        }

        .detail-row + .detail-row {
            border-top: 1px solid var(--line);
        }

        .brand-logo {
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
        }

        .detail-value-strong {
            font-size: clamp(1.1rem, 1rem + 0.7vw, 1.55rem);
            line-height: 1.3;
            letter-spacing: -0.02em;
        }

        .detail-value-mono {
            font-size: clamp(1.2rem, 1.05rem + 0.95vw, 1.8rem);
            line-height: 1.35;
            letter-spacing: 0.03em;
        }

        .detail-value-iban {
            font-size: clamp(0.96rem, 1.14rem, 1.22rem) !important;
            line-height: 1.25;
            letter-spacing: 0.01em;
        }
    </style>
</head>
<body x-data="landingApp()" x-init="init()">
    <div class="mx-auto min-h-screen max-w-6xl px-4 py-6 sm:px-6 sm:py-8">
        <header class="mb-6 flex items-center justify-between gap-4">
            <div class="flex min-w-0 flex-1 items-center gap-3">
                <div x-show="hasChannelLogo() && !channelLogoFailed" x-cloak class="brand-logo flex h-12 w-12 shrink-0 items-center justify-center overflow-hidden rounded-full">
                    <img :src="channelLogoFullUrl()" :alt="channelDisplayName()" class="h-full w-full object-cover"
                         @error="channelLogoFailed = true">
                </div>
                <div x-show="!hasChannelLogo() || channelLogoFailed" x-cloak class="flex h-12 w-12 shrink-0 items-center justify-center rounded-full bg-[rgba(99,91,255,0.12)] text-[var(--accent)]">
                    <span class="text-lg font-semibold" x-text="channelInitial()"></span>
                </div>
                <div class="surface min-w-0 flex-1 rounded-full px-5 py-3 shadow-soft sm:max-w-[18rem]">
                    <p class="truncate text-sm font-semibold text-slate-900" x-text="channelDisplayName()"></p>
                </div>
            </div>
            <button type="button" @click="showLanguages = true" class="surface shrink-0 rounded-full px-4 py-3 text-sm font-medium text-slate-700 shadow-soft">
                <span x-text="languageLabel(currentLang)"></span>
            </button>
        </header>

        <main>
            <div x-show="loading" x-cloak class="surface rounded-[2rem] px-6 py-16 text-center shadow-shell">
                <p class="text-sm uppercase tracking-[0.28em] text-slate-400" x-text="copy.loading"></p>
            </div>

            <section x-show="!loading && mode === 'invalid'" x-cloak id="payment-shell" class="surface mx-auto max-w-2xl rounded-[2rem] p-6 shadow-shell sm:p-8">
                <div class="mx-auto max-w-xl text-center">
                    <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-[rgba(99,91,255,0.10)] text-[var(--accent)]">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 8v4m0 4h.01M5.6 19h12.8c1.33 0 2.16-1.44 1.49-2.6L13.49 5.2c-.67-1.16-2.31-1.16-2.98 0L4.11 16.4C3.44 17.56 4.27 19 5.6 19z" />
                        </svg>
                    </div>
                    <h1 class="mt-6 text-3xl font-semibold tracking-tight text-slate-950 sm:text-4xl" x-text="resolvedInvalidTitle()"></h1>
                    <p class="mt-4 text-base leading-7 text-slate-600" x-text="resolvedInvalidText()"></p>
                    <div class="mt-8 flex flex-wrap justify-center gap-3">
                        <a x-show="hasManagerLink()" x-cloak :href="managerUrl()" target="_blank" rel="noreferrer"
                           class="inline-flex items-center justify-center rounded-full bg-[var(--accent)] px-6 py-3 text-sm font-semibold text-white transition hover:bg-[var(--accent-dark)]">
                            <span x-text="copy.managerButton"></span>
                        </a>
                    </div>
                    <p x-show="!hasManagerLink()" x-cloak class="mt-5 text-sm leading-6 text-slate-500" x-text="copy.managerUnavailable"></p>
                </div>
            </section>

            <section x-show="!loading && mode === 'expired'" x-cloak id="payment-shell" class="surface mx-auto max-w-2xl rounded-[2rem] p-6 shadow-shell sm:p-8">
                <div class="mx-auto max-w-xl text-center">
                    <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-2xl bg-red-50 text-red-500">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <h1 class="mt-6 text-3xl font-semibold tracking-tight text-slate-950 sm:text-4xl" x-text="copy.expiredTitle || 'Time expired'"></h1>
                    <p class="mt-4 text-base leading-7 text-slate-600" x-text="copy.expiredText || 'Request a new payment link.'"></p>
                    <div class="mt-8 flex flex-wrap justify-center gap-3">
                        <a x-show="hasManagerLink()" x-cloak :href="managerUrl()" target="_blank" rel="noreferrer"
                           class="inline-flex items-center justify-center rounded-full bg-[var(--accent)] px-6 py-3 text-sm font-semibold text-white transition hover:bg-[var(--accent-dark)]">
                            <span x-text="copy.managerButton"></span>
                        </a>
                    </div>
                </div>
            </section>

            <section x-show="!loading && mode !== 'invalid' && mode !== 'expired'" x-cloak id="payment-shell" class="surface rounded-[2rem] p-4 shadow-shell sm:p-6 lg:p-8">
                <div class="surface-soft rounded-[1.75rem] p-5 sm:p-6 lg:p-8">
                    <div class="flex flex-wrap items-center justify-between gap-3">
                        <div>
                            <p class="text-[11px] font-medium uppercase tracking-[0.28em] text-slate-400" x-text="copy.bankTransfer"></p>
                            <h1 class="mt-3 text-4xl font-semibold tracking-tight text-slate-950 sm:text-5xl" x-text="formattedAmount()"></h1>
                        </div>
                        <div class="rounded-full border border-slate-200 bg-white px-4 py-2 text-xs font-medium uppercase tracking-[0.2em] text-slate-500" x-text="payment.currency"></div>
                    </div>

                    <div x-show="hasPaymentComment()" x-cloak class="comment-card mt-6 rounded-[1.5rem] px-5 py-5 sm:px-6">
                        <div class="flex items-start gap-4">
                            <div class="comment-icon-shell flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 9v4m0 4h.01M10.29 3.86l-7.5 13A1 1 0 0 0 3.66 18h16.68a1 1 0 0 0 .87-1.5l-7.5-13a1 1 0 0 0-1.74 0z" />
                                </svg>
                            </div>
                            <div class="min-w-0">
                                <p class="text-xs font-semibold uppercase tracking-[0.3em] text-[var(--accent)]" x-text="copy.paymentComment"></p>
                                <p class="mt-3 break-words whitespace-pre-line text-base font-semibold leading-7 text-slate-950" x-text="payment.comment"></p>
                            </div>
                        </div>
                    </div>

                    <div x-show="showTimer()" x-cloak class="mt-6 rounded-[1.35rem] border border-[var(--line)] bg-white px-4 py-4">
                        <div class="flex items-center justify-between gap-4">
                            <div>
                                <p class="text-[11px] font-medium uppercase tracking-[0.26em] text-slate-400" x-text="copy.timerLabel"></p>
                                <p class="mt-2 font-mono text-2xl font-medium text-slate-950" x-text="formattedCountdown()"></p>
                            </div>
                            <div class="rounded-full bg-[rgba(99,91,255,0.08)] px-3 py-1.5 text-[11px] font-semibold uppercase tracking-[0.18em] text-[var(--accent)]">
                                <span x-text="copy.timerLive"></span>
                            </div>
                        </div>
                        <p class="mt-3 text-sm leading-6 text-slate-600" x-text="copy.timerText"></p>
                    </div>

                    <div class="mt-8 flex items-start justify-between gap-4">
                        <div>
                            <p class="text-[11px] font-medium uppercase tracking-[0.28em] text-slate-400" x-text="copy.paymentDetails"></p>
                            <h2 class="mt-2 text-2xl font-semibold tracking-tight text-slate-950 sm:text-3xl" x-text="copy.paymentDetailsTitle"></h2>
                        </div>
                        <p x-show="copyMessage" x-cloak class="text-sm font-medium text-[var(--success)]" x-text="copyMessage"></p>
                    </div>

                    <p class="mt-3 text-sm leading-6 text-slate-600" x-text="copy.paymentDetailsHint"></p>

                    <div class="mt-6 overflow-hidden rounded-[1.5rem] border border-[var(--line)] bg-white">
                        <div class="detail-row flex items-start justify-between gap-4 px-5 py-5 sm:px-6">
                            <div class="min-w-0">
                                <p class="text-[11px] font-medium uppercase tracking-[0.24em] text-slate-400" x-text="copy.bank"></p>
                                <p class="detail-value-strong mt-2 font-semibold text-slate-950" x-text="requisites.bank_name"></p>
                            </div>
                            <button type="button" @click="copyField('bank', requisites.bank_name)"
                                    class="-mr-1 -mt-1 shrink-0 self-start rounded-full px-3 py-1.5 text-[10px] font-semibold uppercase tracking-[0.16em] transition sm:-mr-2 sm:-mt-2"
                                    :class="copiedField === 'bank' ? 'bg-[var(--success)] text-white' : 'bg-slate-950 text-white hover:bg-slate-800'"
                                    x-text="copiedField === 'bank' ? '✓ ' + copy.copied : copy.copyAction"></button>
                        </div>

                        <div class="detail-row flex items-start justify-between gap-4 px-5 py-5 sm:px-6">
                            <div class="min-w-0">
                                <p class="text-[11px] font-medium uppercase tracking-[0.24em] text-slate-400" x-text="copy.account"></p>
                                <p class="detail-value-mono detail-value-iban mt-2 font-mono font-semibold text-slate-950" x-text="requisites.card_number"></p>
                            </div>
                            <button type="button" @click="copyField('card', requisites.card_number)"
                                    class="-mr-1 -mt-1 shrink-0 self-start rounded-full px-3 py-1.5 text-[10px] font-semibold uppercase tracking-[0.16em] transition sm:-mr-2 sm:-mt-2"
                                    :class="copiedField === 'card' ? 'bg-[var(--success)] text-white' : 'bg-slate-950 text-white hover:bg-slate-800'"
                                    x-text="copiedField === 'card' ? '✓ ' + copy.copied : copy.copyAction"></button>
                        </div>

                        <div class="detail-row flex items-start justify-between gap-4 px-5 py-5 sm:px-6">
                            <div class="min-w-0">
                                <p class="text-[11px] font-medium uppercase tracking-[0.24em] text-slate-400">BIC / SWIFT</p>
                                <p class="detail-value-mono mt-2 font-mono font-medium text-slate-950" x-text="requisites.bic_swift || '—'"></p>
                            </div>
                            <button type="button" @click="copyField('bic', requisites.bic_swift)"
                                    class="-mr-1 -mt-1 shrink-0 self-start rounded-full px-3 py-1.5 text-[10px] font-semibold uppercase tracking-[0.16em] transition sm:-mr-2 sm:-mt-2"
                                    :disabled="!requisites.bic_swift"
                                    :class="!requisites.bic_swift ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : (copiedField === 'bic' ? 'bg-[var(--success)] text-white' : 'bg-slate-950 text-white hover:bg-slate-800')"
                                    x-text="copiedField === 'bic' ? '✓ ' + copy.copied : copy.copyAction"></button>
                        </div>

                        <div class="detail-row flex items-start justify-between gap-4 px-5 py-5 sm:px-6">
                            <div class="min-w-0">
                                <p class="text-[11px] font-medium uppercase tracking-[0.24em] text-slate-400" x-text="copy.receiver"></p>
                                <p class="detail-value-strong mt-2 font-semibold text-slate-950" x-text="requisites.receiver_name"></p>
                            </div>
                            <button type="button" @click="copyField('receiver', requisites.receiver_name)"
                                    class="-mr-1 -mt-1 shrink-0 self-start rounded-full px-3 py-1.5 text-[10px] font-semibold uppercase tracking-[0.16em] transition sm:-mr-2 sm:-mt-2"
                                    :class="copiedField === 'receiver' ? 'bg-[var(--success)] text-white' : 'bg-slate-950 text-white hover:bg-slate-800'"
                                    x-text="copiedField === 'receiver' ? '✓ ' + copy.copied : copy.copyAction"></button>
                        </div>
                    </div>

                    <div x-show="hasPaymentLabel()" x-cloak class="mt-6 rounded-[1.35rem] border border-[var(--line)] bg-white px-5 py-5 sm:px-6">
                        <p class="text-[11px] font-medium uppercase tracking-[0.26em] text-slate-400" x-text="copy.paymentPurpose"></p>
                        <p class="mt-3 break-words whitespace-pre-line text-lg font-semibold leading-8 text-slate-950" x-text="payment.label"></p>
                    </div>

                    <div class="mt-8">
                        <button type="button" @click="showAfterPayment = true"
                                class="inline-flex min-h-14 w-full items-center justify-center rounded-[1.35rem] bg-[var(--accent)] px-6 py-4 text-base font-semibold text-white transition hover:bg-[var(--accent-dark)] sm:text-lg">
                            <span x-text="copy.paidAction"></span>
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div x-show="showLanguages" x-cloak class="fixed inset-0 z-50 flex items-end bg-slate-950/35 p-0 sm:items-center sm:justify-center sm:p-6"
         @keydown.escape.window="showLanguages = false">
        <div class="surface w-full rounded-t-[2rem] p-5 shadow-shell sm:max-w-xl sm:rounded-[2rem]" @click.outside="showLanguages = false">
            <div class="flex items-center justify-between gap-4">
                <div>
                    <p class="text-[11px] font-medium uppercase tracking-[0.26em] text-slate-400" x-text="copy.chooseLanguage"></p>
                    <p class="mt-2 text-sm text-slate-600">
                        <span x-text="copy.defaultLanguage"></span>
                        <span class="font-medium text-slate-950" x-text="languageLabel(recommendedLanguage)"></span>
                    </p>
                </div>
                <button type="button" class="rounded-full border border-slate-200 px-3 py-2 text-sm font-medium text-slate-600" @click="showLanguages = false" x-text="copy.close"></button>
            </div>

            <div class="mt-5 grid gap-2 sm:grid-cols-2">
                <template x-for="language in availableLanguages" :key="language.code">
                    <button type="button" @click="changeLanguage(language.code)"
                            class="flex w-full items-center justify-between rounded-2xl border px-4 py-3 text-left text-sm transition"
                            :class="currentLang === language.code ? 'border-[var(--accent)] bg-[rgba(99,91,255,0.08)] text-slate-950' : 'border-slate-200 bg-white text-slate-700 hover:bg-slate-50'">
                        <span x-text="language.label"></span>
                        <span class="text-xs uppercase tracking-[0.22em]" x-text="language.code"></span>
                    </button>
                </template>
            </div>
        </div>
    </div>

    <div x-show="showAfterPayment" x-cloak class="fixed inset-0 z-50 flex items-end bg-slate-950/35 p-0 sm:items-center sm:justify-center sm:p-6"
         @keydown.escape.window="showAfterPayment = false">
        <div class="surface w-full rounded-t-[2rem] p-5 shadow-shell sm:max-w-xl sm:rounded-[2rem]" @click.outside="showAfterPayment = false">
            <div class="flex items-center justify-between gap-4">
                <div>
                    <p class="text-[11px] font-medium uppercase tracking-[0.26em] text-slate-400" x-text="copy.afterPayment"></p>
                    <h3 class="mt-2 text-2xl font-semibold tracking-tight text-slate-950" x-text="copy.afterPaymentTitle"></h3>
                </div>
                <button type="button" class="rounded-full border border-slate-200 px-3 py-2 text-sm font-medium text-slate-600" @click="showAfterPayment = false" x-text="copy.close"></button>
            </div>

            <p class="mt-4 text-sm leading-6 text-slate-700" x-text="copy.afterPaymentHint"></p>

            <div class="mt-6 flex flex-wrap gap-3">
                <a x-show="hasManagerLink()" x-cloak :href="managerUrl()" target="_blank" rel="noreferrer"
                   class="inline-flex items-center justify-center rounded-2xl bg-[var(--accent)] px-5 py-3.5 text-sm font-semibold text-white transition hover:bg-[var(--accent-dark)]">
                    <span x-text="copy.managerButton"></span>
                </a>
            </div>

            <p x-show="!hasManagerLink()" x-cloak class="mt-4 text-sm leading-6 text-slate-500" x-text="copy.managerUnavailable"></p>
        </div>
    </div>

    <script>
        const APP_BASE_URL = window.location.protocol.startsWith("http")
            ? window.location.origin
            : "http://127.0.0.1:8000";

        const localeMap = {
            en: "en-GB",
            es: "es-ES",
            de: "de-DE",
            fr: "fr-FR",
            ro: "ro-RO",
            it: "it-IT",
            lt: "lt-LT",
            pl: "pl-PL"
        };

        const languageCatalog = [
            { code: "en", label: "English" },
            { code: "es", label: "Español" },
            { code: "de", label: "Deutsch" },
            { code: "fr", label: "Français" },
            { code: "ro", label: "Română" },
            { code: "it", label: "Italiano" },
            { code: "lt", label: "Lietuvių" },
            { code: "pl", label: "Polski" }
        ];

        const translations = {
            en: {
                loading: "Loading",
                chooseLanguage: "Choose language",
                defaultLanguage: "Default:",
                close: "Close",
                invalidTitle: "This payment link is incomplete",
                invalidText: "Ask for a valid payment link with the amount included.",
                missingManagerTitle: "This payment page is unavailable",
                missingManagerText: "This payment link cannot be used yet because no Telegram contact is configured.",
                missingRequisitesTitle: "This payment page is unavailable",
                missingRequisitesText: "There are currently no payment details configured.",
                expiredTitle: "Time expired",
                expiredText: "This payment link is no longer active. Request a new payment link.",
                bankTransfer: "Bank transfer",
                paymentPurpose: "Payment purpose",
                paymentComment: "Important!",
                timerLabel: "Details refresh in",
                timerLive: "Live",
                timerText: "When the timer ends, this link becomes inactive. Request a new link.",
                paymentDetails: "Payment details",
                paymentDetailsTitle: "Transfer using the details below",
                paymentDetailsHint: "Copy the bank details exactly as shown on this page.",
                bank: "Bank",
                account: "IBAN",
                receiver: "Receiver",
                copyAction: "Copy",
                copied: "Copied",
                afterPayment: "After payment",
                afterPaymentTitle: "Send the receipt after payment",
                afterPaymentHint: "Send the receipt to the Telegram contact after the transfer is complete.",
                paidAction: "Paid",
                managerButton: "Open Telegram",
                managerUnavailable: "Telegram contact link is not configured yet."
            },
            es: {
                loading: "Cargando",
                chooseLanguage: "Elegir idioma",
                defaultLanguage: "Por defecto:",
                close: "Cerrar",
                invalidTitle: "Este enlace de pago está incompleto",
                invalidText: "Pide un enlace correcto con el importe incluido.",
                missingManagerTitle: "Esta pagina de pago no esta disponible",
                missingManagerText: "Este enlace no se puede usar todavia porque no hay un contacto de Telegram configurado.",
                missingRequisitesTitle: "Esta pagina de pago no esta disponible",
                missingRequisitesText: "Ahora mismo no hay datos de pago disponibles.",

        function landingApp() {
            return {
                loading: true,
                showLanguages: false,
                showAfterPayment: false,
                channelLogoFailed: false,
                currentLang: "es",
                recommendedLanguage: "es",
                mode: "invalid",
                invalidReason: "",
                visitor: {},
                visitToken: "",
                copyMessage: "",
                copyTimerId: null,
                countdownTimerId: null,
                timeLeftSeconds: 0,
                availableLanguages: languageCatalog,
                copy: translations.es,
                geo: {
                    geo_code: "ES",
                    geo_name: "Spain",
                    default_language: "es",
                    refresh_minutes: 15,
                    refresh_seconds: 900
                },
                manager: {
                    id: null,
                    geo_code: "ES",
                    manager_name: "Manager",
                    manager_telegram_url: "",
                    channel_name: "Dream Team",
                    channel_logo_url: ""
                },
                requisites: {
                    bank_name: "Dream Team Pay",
                    card_number: "0000 0000 0000 0000",
                    bic_swift: "",
                    receiver_name: "Payment Operations",
                    created_at: null
                },
                payment: {
                    amount: null,
                    currency: "EUR",
                    label: "",
                    comment: ""
                },

                async init() {
                    const context = await this.fetchContext();
                    this.mode = context.mode || "invalid";
                    this.invalidReason = String(context.invalid_reason || "");
                    this.channelLogoFailed = false;
                    this.geo = context.geo || this.geo;
                    this.manager = context.manager || this.manager;
                    this.requisites = context.requisites || this.requisites;
                    this.payment = context.payment || this.payment;
                    this.visitor = context.visitor || {};
                    this.visitToken = String(context.visit?.token || "");
                    this.availableLanguages = context.available_languages || languageCatalog;
                    this.recommendedLanguage = this.resolveLanguageCode(context.recommended_language || this.geo.default_language || "es");

                    const queryParams = new URLSearchParams(window.location.search);
                    const queryLang = queryParams.get("lang");
                    const explicitGeo = queryParams.get("geo");
                    const hasPaymentLink = queryParams.has("link");
                    const storedLang = window.localStorage.getItem("dream-team-language");
                    const initialLanguage = hasPaymentLink
                        ? this.resolveLanguageCode(queryLang || this.recommendedLanguage || "es")
                        : (explicitGeo
                            ? this.resolveLanguageCode(queryLang || this.recommendedLanguage || "es")
                            : this.resolveLanguageCode(queryLang || storedLang || this.recommendedLanguage || "es"));
                    this.applyLanguage(initialLanguage);

                    this.restartCountdown(Number(context.timer?.refresh_seconds || this.geo.refresh_seconds || 0));
                    this.loading = false;

                    this.$nextTick(() => {
                        gsap.fromTo("#payment-shell", { opacity: 0, y: 22, scale: 0.99 }, { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: "power2.out" });
                    });
                },

                async fetchContext() {
                    const endpoint = this.apiUrl(`/api/landing-context${window.location.search || ""}`);
                    try {
                        const response = await fetch(endpoint);
                        if (!response.ok) {
                            throw new Error("Context load failed");
                        }
                        return await response.json();
                    } catch (error) {
                        return {
                            mode: "invalid",
                            recommended_language: "es",
                            available_languages: languageCatalog,
                            payment: this.payment,
                            geo: this.geo,
                            manager: this.manager,
                            requisites: this.requisites,
                            visit: { token: "" },
                            visitor: {},
                            timer: { refresh_seconds: 0 }
                        };
                    }
                },

                apiUrl(path) {
                    return `${APP_BASE_URL}${path}`;
                },

                resolveLanguageCode(languageCode) {
                    return languageCatalog.some((language) => language.code === languageCode) ? languageCode : "es";
                },

                applyLanguage(languageCode) {
                    const safe = this.resolveLanguageCode(languageCode);
                    this.currentLang = safe;
                    this.copy = { ...translations.es, ...(translations[safe] || {}) };
                    document.documentElement.lang = safe;
                    window.localStorage.setItem("dream-team-language", safe);
                },

                changeLanguage(languageCode) {
                    this.applyLanguage(languageCode);
                    this.showLanguages = false;
                },

                resolvedInvalidTitle() {
                    if (this.invalidReason === "link_expired") {
                        return this.copy.expiredTitle;
                    }
                    if (this.invalidReason === "manager_missing") {
                        return this.copy.missingManagerTitle;
                    }
                    if (this.invalidReason === "requisites_missing") {
                        return this.copy.missingRequisitesTitle || this.copy.missingManagerTitle;
                    }
                    return this.copy.invalidTitle;
                },

                resolvedInvalidText() {
                    if (this.invalidReason === "link_expired") {
                        return this.copy.expiredText;
                    }
                    if (this.invalidReason === "manager_missing") {
                        return this.copy.missingManagerText;
                    }
                    if (this.invalidReason === "requisites_missing") {
                        return this.copy.missingRequisitesText || this.copy.invalidText;
                    }
                    return this.copy.invalidText;
                },

                languageLabel(code) {
                    const found = this.availableLanguages.find((language) => language.code === code) || languageCatalog.find((language) => language.code === code);
                    return found ? found.label : "Español";
                },

                channelDisplayName() {
                    const rawName = String(this.manager.channel_name || "").trim();
                    if (!rawName) {
                        return "Pay";
                    }
                    const parts = rawName
                        .split(/\r?\n/u)
                        .map((part) => part.trim())
                        .filter(Boolean);
                    const candidate = String(parts.find((part) => /[^\d\s]/u.test(part)) || parts[parts.length - 1] || rawName)
                        .replace(/^\d{5,}\s*/u, "")
                        .trim();
                    return candidate || "Pay";
                },

                channelInitial() {
                    return this.channelDisplayName().charAt(0).toUpperCase() || "D";
                },

                channelLogoUrl() {
                    return String(this.manager.channel_logo_url || "").trim();
                },

                channelLogoFullUrl() {
                    const raw = this.channelLogoUrl();
                    if (!raw) return "";
                    if (raw.startsWith("http://") || raw.startsWith("https://")) return raw;
                    const base = APP_BASE_URL.replace(/\/$/, "");
                    return raw.startsWith("/") ? `${base}${raw}` : `${base}/${raw}`;
                },

                hasChannelLogo() {
                    return Boolean(this.channelLogoUrl());
                },

                formattedAmount() {
                    if (this.payment.amount === null || this.payment.amount === undefined) {
                        return "—";
                    }
                    const locale = localeMap[this.currentLang] || "es-ES";
                    return new Intl.NumberFormat(locale, {
                        style: "currency",
                        currency: this.payment.currency || "EUR",
                        maximumFractionDigits: 2
                    }).format(this.payment.amount || 0);
                },

                showTimer() {
                    return this.timeLeftSeconds > 0;
                },

                hasPaymentLabel() {
                    return Boolean(String(this.payment.label || "").trim());
                },

                hasPaymentComment() {
                    return Boolean(String(this.payment.comment || "").trim());
                },

                managerUrl() {
                    const raw = String(this.manager.manager_telegram_url || "").trim();
                    if (!raw) {
                        return "";
                    }
                    if (raw.startsWith("@") && raw.length > 1) {
                        return `https://t.me/${raw.slice(1)}`;
                    }
                    if (raw.startsWith("t.me/")) {
                        return `https://${raw}`;
                    }
                    return raw;
                },

                hasManagerLink() {
                    return Boolean(this.managerUrl());
                },

                restartCountdown(seconds) {
                    if (this.countdownTimerId) {
                        clearInterval(this.countdownTimerId);
                    }
                    this.timeLeftSeconds = Math.max(0, Number(seconds || 0));
                    if (!this.timeLeftSeconds) {
                        return;
                    }
                    this.countdownTimerId = setInterval(() => {
                        if (this.timeLeftSeconds <= 1) {
                            clearInterval(this.countdownTimerId);
                            this.countdownTimerId = null;
                            this.timeLeftSeconds = 0;
                            this.showAfterPayment = false;
                            this.mode = "expired";
                            this.invalidReason = "link_expired";
                            return;
                        }
                        this.timeLeftSeconds -= 1;
                    }, 1000);
                },

                formattedCountdown() {
                    const total = Math.max(0, this.timeLeftSeconds);
                    const minutes = String(Math.floor(total / 60)).padStart(2, "0");
                    const seconds = String(total % 60).padStart(2, "0");
                    return `${minutes}:${seconds}`;
                },

                fallbackCopy(value) {
                    const helper = document.createElement("textarea");
                    helper.value = value;
                    helper.setAttribute("readonly", "");
                    helper.style.cssText = "position:fixed;left:-9999px;top:-9999px;opacity:0;";
                    document.body.appendChild(helper);
                    helper.focus();
                    helper.select();
                    try { document.execCommand("copy"); } catch (_) {}
                    document.body.removeChild(helper);
                },

                async copyText(text) {
                    const value = String(text || "").trim();
                    if (!value) return;

                    try {
                        if (navigator.clipboard && window.isSecureContext) {
                            await navigator.clipboard.writeText(value);
                        } else {
                            this.fallbackCopy(value);
                        }
                    } catch (_) {
                        this.fallbackCopy(value);
                    }

                    this.copyMessage = this.copy.copied;
                    window.clearTimeout(this.copyTimerId);
                    this.copyTimerId = window.setTimeout(() => { this.copyMessage = ""; }, 1800);
                },

                copiedField: null,
                copiedTimerId: null,

                copyField(fieldKey, value) {
                    this.copyText(value);
                    this.copiedField = fieldKey;
                    window.clearTimeout(this.copiedTimerId);
                    this.copiedTimerId = window.setTimeout(() => { this.copiedField = null; }, 1800);
                }
            };
        }
    </script>
